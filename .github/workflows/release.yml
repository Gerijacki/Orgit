name: Release

# Automated release pipeline. On every push to main, release-please maintains a
# "release PR" that bumps the version and updates the changelog from Conventional
# Commit messages. When you merge that PR, it tags the release and creates a GitHub
# Release — which triggers the publish job below to build, test, and publish to npm.
#
# Requires: an NPM_TOKEN secret (npm automation token) for publishing.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Manifest mode: config comes from release-please-config.json +
      # .release-please-manifest.json (keeps the project in 0.x — breaking changes bump the
      # minor, features bump the patch — via bump-minor-pre-major / bump-patch-for-minor-pre-major).
      - uses: googleapis/release-please-action@v5
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    # Surface the secret as a job env so steps can check whether it is configured
    # (the `secrets` context can't be used directly in an `if:` condition).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      # pnpm version comes from package.json "packageManager" — do not also set it here,
      # or pnpm/action-setup errors on the conflict.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify before publishing
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish (no NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: |
          echo "::notice::NPM_TOKEN is not set — skipping npm publish."
          echo "The GitHub Release/tag was still created. Add an NPM_TOKEN secret to enable publishing."
