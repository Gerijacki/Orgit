name: Release

# Automated release pipeline. On every push to main, release-please maintains a
# "release PR" that bumps the version and updates the changelog from Conventional
# Commit messages. When you merge that PR, it tags the release and creates a GitHub
# Release — which triggers the publish job below to build, test, and publish to npm.
#
# Requires: an NPM_TOKEN secret (npm automation token) for publishing.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7

      # pnpm version comes from package.json "packageManager" — do not also set it here,
      # or pnpm/action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify before publishing
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
